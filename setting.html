<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
:root { --primary:#27ae60; --bg:#f5f7fa; --card-bg:#fff; --text:#2c3e50; --border:#f0f1f3; }

body { font-family:-apple-system,sans-serif;background:var(--bg);margin:0;padding:0 0 80px;color:var(--text); }

.header { background:#fff;padding:15px;display:flex;align-items:center;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100; }
.header-title { flex:1;text-align:center;font-weight:600; }

.section-title { font-size:12px;color:#7f8c8d;margin:15px;font-weight:700; }
.card { background:#fff;border-radius:12px;margin:0 10px 15px;overflow:hidden; }
.row { display:flex;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--border); }
.row:last-child{border-bottom:none;}

.val-edit { border:1px solid #ddd;border-radius:6px;padding:5px;width:80px;text-align:right; }

/* ===== COLLAPSIBLE ===== */
.collapsible .card { display:none; }
.collapsible.active .card { display:block; }

.section-title.clickable {
    cursor:pointer;
    position:relative;
}

.section-title.clickable::after {
    content:"›";
    position:absolute;
    right:10px;
    transition:.3s;
}

.collapsible.active .section-title::after {
    transform:rotate(90deg);
}
</style>
</head>

<body>

<div class="header">
    <div class="header-title">CÀI ĐẶT NÂNG CAO</div>
</div>

<!-- ================= PIN (MỞ SẴN) ================= -->
<div class="collapsible active">
    <div class="section-title clickable" onclick="toggleSection(this)">
        CÀI ĐẶT PIN
    </div>
    <div class="card">
        <div class="row">
            <div>Thương hiệu</div>
            <select class="val-edit">
                <option>No Battery</option>
                <option>Lead-Acid</option>
            </select>
        </div>

        <div class="row">
            <div>Dung lượng</div>
            <input class="val-edit" type="number" value="100">
        </div>

        <div class="row">
            <div>CS Sạc</div>
            <input class="val-edit" type="number" value="2200">
        </div>

        <div class="row">
            <div>CS Xả</div>
            <input class="val-edit" type="number" value="4000">
        </div>
    </div>
</div>

<!-- ================= SẠC LƯỚI ================= -->
<div class="collapsible">
    <div class="section-title clickable" onclick="toggleSection(this)">
        SẠC TỪ LƯỚI
    </div>
    <div class="card">
        <div class="row">
            <div>Cho phép sạc</div>
            <input type="checkbox">
        </div>
        <div class="row">
            <div>Công suất</div>
            <input class="val-edit" type="number">
        </div>
    </div>
</div>

<!-- ================= XẢ ================= -->
<div class="collapsible">
    <div class="section-title clickable" onclick="toggleSection(this)">
        XẢ
    </div>
    <div class="card">
        <div class="row">
            <div>Ngắt xả</div>
            <input class="val-edit" type="number">
        </div>
    </div>
</div>

<!-- ================= ĐIỀU KHIỂN ================= -->
<div class="collapsible">
    <div class="section-title clickable" onclick="toggleSection(this)">
        ĐIỀU KHIỂN CÔNG SUẤT
    </div>
    <div class="card">
        <div class="row">
            <div>Mode</div>
            <select class="val-edit">
                <option>CT</option>
                <option>Meter</option>
            </select>
        </div>
    </div>
</div>

<!-- ================= BẢO VỆ ================= -->
<div class="collapsible">
    <div class="section-title clickable" onclick="toggleSection(this)">
        BẢO VỆ HỆ THỐNG
    </div>
    <div class="card">
        <div class="row">
            <div>Áp thấp</div>
            <input class="val-edit" type="number">
        </div>
    </div>
</div>

<!-- ================= TẢI DỰ PHÒNG ================= -->
<div class="collapsible">
    <div class="section-title clickable" onclick="toggleSection(this)">
        TẢI DỰ PHÒNG
    </div>
    <div class="card">
        <div class="row">
            <div>EPS</div>
            <input type="checkbox">
        </div>
    </div>
</div>

<!-- ================= BẢO VỆ NÂNG CAO ================= -->
<div class="collapsible">
    <div class="section-title clickable" onclick="toggleSection(this)">
        BẢO VỆ NÂNG CAO
    </div>
    <div class="card">
        <div class="row">
            <div>LVRT</div>
            <input type="checkbox">
        </div>
    </div>
</div>

<script>
function toggleSection(el) {
    const parent = el.parentElement;

    // accordion: mở 1 đóng hết
    document.querySelectorAll('.collapsible').forEach(sec => {
        if (sec !== parent) sec.classList.remove('active');
    });

    parent.classList.toggle('active');
}
</script>

</body>
</html>
